<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Lerat</title>

    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background: #f6f3ee;
            color: #4d433d;
            text-align: center;
        }

        header {
            padding: 60px 20px 40px;
        }

        .logo {
            max-width: 250px;
            width: 80%;
        }

        .intro {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.7;
        }

        nav {
            margin: 40px 0;
        }

        nav a {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            text-decoration: none;
            color: #4d433d;
            border: 1px solid #cdbba8;
            border-radius: 999px;
            transition: 0.2s;
        }

        nav a:hover {
            background: #e8dfd5;
        }

        .gallery-preview {
            max-width: 1000px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            gap: 15px;
            padding: 20px;
        }

        .gallery-preview img {
            width: 100%;
            border-radius: 12px;
            object-fit: cover;
        }

        footer {
            margin-top: 60px;
            padding: 30px;
            color: #7a6f66;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>

    <!-- Din logga -->
    <img src="images/94C53739-A06D-4BC0-8B5F-21618B252E79.png" alt="Studio Lerat" class="logo">

</header>

<section class="intro">
    <p>
        Välkommen till Studio Lerat.
    </p>

    <p>
        Här samlas min keramik, pågående projekt och annat jag skapar.
    </p>
</section>

<nav>
    <a href="#">Galleri</a>
    <a href="#">Projekt</a>
    <a href="#">Kontakt</a>
    <a href="https://instagram.com/" target="_blank">Instagram</a>
</nav>

<section class="gallery-preview">

    <!-- Tillfälliga platshållare -->
    <img src="https://picsum.photos/400?1">
    <img src="https://picsum.photos/400?2">
    <img src="https://picsum.photos/400?3">

</section>

<footer>
    Studio Lerat
</footer>

</body>
</html>
