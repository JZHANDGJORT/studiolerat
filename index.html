<!DOCTYPE html>
<html lang="sv">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio Lerat</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">


<style>


/* ===============================
   GRUND
================================ */


*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}


html{

    scroll-behavior:smooth;

}


body{

    background:#f8f5ef;

    color:#4c453f;

    font-family:"Nunito", sans-serif;

    line-height:1.7;

}


img{

    width:100%;

    display:block;

}


a{

    text-decoration:none;

    color:inherit;

}



/* ===============================
   TYPOGRAFI
================================ */


h1,
h2,
h3{

    font-family:"Cormorant Garamond", serif;

    font-weight:500;

}


.section-title{

    text-align:center;

    font-size:48px;

    margin-bottom:20px;

}


.section-text{

    max-width:700px;

    margin:0 auto;

    text-align:center;

    font-size:18px;

}



/* ===============================
   HERO
================================ */


.hero{

    min-height:100vh;

    display:flex;

    align-items:center;

    justify-content:center;

    text-align:center;

    padding:30px;

    color:white;


    background:

    linear-gradient(
    rgba(0,0,0,0.25),
    rgba(0,0,0,0.25)
    ),

    url("bilder/hero.jpg");

    background-size:cover;

    background-position:center;


}



.hero-content{

    max-width:700px;

}



.hero h1{

    font-size:72px;

    letter-spacing:3px;

    margin-bottom:20px;

}



.hero p{

    font-size:21px;

    margin-bottom:35px;

}



.button{


    display:inline-block;

    background:white;

    color:#514940;

    padding:14px 35px;

    border-radius:40px;

    font-weight:600;

    transition:.3s;


}


.button:hover{

    transform:translateY(-3px);

}



/* ===============================
   SEKTIONER
================================ */


section{

    width:min(1100px,92%);

    margin:auto;

    padding:90px 0;

}
